<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      try {
        document.documentElement.setAttribute('data-theme', localStorage.getItem('docs-theme') || 'light');
      } catch (e) {}
    </script>
    <title>Rappi CPGS Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-page="landing">
    <div class="page-shell" id="page-shell">
      <header class="landing__header">
        <div class="landing__header-bar">
          <span class="landing__header-spacer" aria-hidden="true"></span>
          <button type="button" class="btn btn--theme" data-theme-toggle aria-label="Alternar tema">
            Modo Escuro
          </button>
        </div>
        <img class="landing__logo" src="assets/img/logo.png" alt="Rappi" />
        <h1 class="landing__title">Documentação Open APIs</h1>
        <p class="lead landing__subtitle">Todas nossas soluções em um único lugar.</p>
      </header>
      <main class="landing__main">
        <section class="landing__cards" aria-label="APIs disponíveis">
          <a class="api-card landing__card fg-catalog" href="pages/open-catalog.html" data-page-link>
            <span class="api-card__name">Open Catalog</span>
            <span class="api-card__note">Catálogo de produtos.</span>
          </a>
          <a class="api-card landing__card fg-inventory" href="pages/inventory.html" data-page-link>
            <span class="api-card__name">Basic Inventory</span>
            <span class="api-card__note">Atualização de estoque e preço.</span>
          </a>
          <a class="api-card landing__card fg-complex" href="pages/complex-discounts.html" data-page-link>
            <span class="api-card__name">Complex Discounts</span>
            <span class="api-card__note">Promoções e descontos avançados.</span>
          </a>
          <a class="api-card landing__card fg-exclusive" href="pages/open-orders.html" data-page-link>
            <span class="api-card__name">Open Orders</span>
            <span class="api-card__note">Gestão de pedidos.</span>
          </a>
          <a class="api-card landing__card fg-exclusive" href="pages/payless.html" data-page-link>
            <span class="api-card__name">Payless</span>
            <span class="api-card__note">Pagamentos integrados.</span>
          </a>
          <a class="api-card landing__card fg-loyalty" href="pages/loyalty.html" data-page-link>
            <span class="api-card__name">Loyalty</span>
            <span class="api-card__note">Programa de fidelidade.</span>
          </a>
        </section>
      </main>
    </div>
    <script src="assets/js/content.js"></script>
    <script src="assets/js/credentials.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
